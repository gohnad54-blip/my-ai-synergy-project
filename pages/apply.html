<header class="border-b border-pulse-violet/20 bg-nebula-deep/80 backdrop-blur-sm">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
    <a href="/" class="font-display text-lg text-neural-glow">AI Synergy</a>
    <div class="flex items-center gap-4">
      <span id="lang-switcher-slot"></span>
      <a href="/" class="text-sm text-dim-text hover:text-neural-glow" data-i18n="nav.backHome">← На головну</a>
    </div>
  </div>
</header>

<main class="mx-auto max-w-lg px-4 py-12">
  <div id="apply-success" class="hidden rounded-xl border border-success/30 bg-success/10 p-6 text-center">
    <h1 class="font-display text-2xl text-success" data-i18n="apply.successTitle">Заявку надіслано!</h1>
    <p class="mt-3 text-sm text-dim-text" data-i18n="apply.successMessage">Ми розглянемо вашу заявку та зв'яжемося з вами електронною поштою.</p>
    <a href="/" class="mt-6 inline-block text-synapse-blue hover:text-neural-glow" data-i18n="nav.backHome">← На головну</a>
  </div>

  <div id="apply-form-wrap">
    <h1 class="font-display text-2xl text-neural-glow" data-i18n="apply.title">Подати заявку</h1>
    <p class="mt-2 text-sm text-dim-text" data-i18n="apply.subtitle">Заповніть форму, щоб долучитися до клубу AI Synergy.</p>

    <form id="apply-form" name="account-request" data-netlify="true" netlify-honeypot="bot-field" class="mt-8 space-y-5">
      <input type="hidden" name="form-name" value="account-request">
      <p class="hidden">
        <label>Don’t fill this out: <input name="bot-field"></label>
      </p>

      <div>
        <label for="apply-name" class="mb-1 block text-sm text-dim-text" data-i18n="apply.name">Ім'я</label>
        <input id="apply-name" name="name" type="text" required autocomplete="name"
          class="w-full rounded-lg border border-pulse-violet/30 bg-space-void px-4 py-2 outline-none focus:border-neural-glow">
      </div>

      <div>
        <label for="apply-email" class="mb-1 block text-sm text-dim-text" data-i18n="apply.email">Email</label>
        <input id="apply-email" name="email" type="email" required autocomplete="email"
          class="w-full rounded-lg border border-pulse-violet/30 bg-space-void px-4 py-2 outline-none focus:border-neural-glow">
      </div>

      <div>
        <label for="apply-telegram" class="mb-1 block text-sm text-dim-text" data-i18n="apply.telegram">Telegram (необов'язково)</label>
        <input id="apply-telegram" name="telegram" type="text" autocomplete="off" placeholder="@username"
          class="w-full rounded-lg border border-pulse-violet/30 bg-space-void px-4 py-2 outline-none focus:border-neural-glow">
      </div>

      <div>
        <label for="apply-reason" class="mb-1 block text-sm text-dim-text" data-i18n="apply.reason">Чому хочете долучитися?</label>
        <textarea id="apply-reason" name="reason" required rows="4"
          class="w-full rounded-lg border border-pulse-violet/30 bg-space-void px-4 py-2 outline-none focus:border-neural-glow"></textarea>
      </div>

      <button type="submit"
        class="w-full rounded-lg bg-pulse-violet py-2.5 font-medium transition hover:shadow-[0_0_20px_rgba(124,58,237,0.4)]"
        data-i18n="apply.submit">
        Надіслати заявку
      </button>
    </form>
  </div>
</main>

<!-- Netlify build-time form detection -->
<form name="account-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="account-request">
  <input name="name">
  <input name="email">
  <input name="telegram">
  <textarea name="reason"></textarea>
</form>
