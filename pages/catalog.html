<header class="border-b border-pulse-violet/20 bg-nebula-deep/80 backdrop-blur-sm">
  <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
    <a href="/" class="font-display text-lg tracking-wide text-neural-glow">AI Synergy</a>
    <nav class="flex flex-wrap items-center gap-4 text-sm">
      <a href="/" data-nav="/" data-i18n="nav.home">Головна</a>
      <a href="/materials" data-nav="/materials" class="text-neural-glow" data-i18n="nav.materials">Матеріали</a>
      <a href="/about" data-nav="/about" data-i18n="nav.about">Про клуб</a>
      <a href="/apply" data-nav="/apply" data-i18n="nav.apply">Подати заявку</a>
      <span id="lang-switcher-slot"></span>
      <span id="public-auth-slot"></span>
    </nav>
  </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-10">
  <h1 class="font-display text-3xl text-neural-glow" data-i18n="catalog.title">Каталог матеріалів</h1>

  <div class="mt-6">
    <label class="sr-only" for="catalog-search" data-i18n="catalog.searchLabel">Пошук матеріалів</label>
    <input id="catalog-search" type="search" data-i18n-placeholder="catalog.searchPlaceholder" placeholder="🔍 Пошук матеріалів…"
      class="w-full rounded-xl border border-pulse-violet/30 bg-nebula-deep/50 px-4 py-3 text-sm outline-none focus:border-neural-glow">
  </div>

  <div class="mt-8 flex flex-col gap-8 lg:flex-row">
    <button type="button" id="catalog-filters-toggle"
      class="catalog-filters-toggle flex w-full items-center justify-between rounded-xl border border-pulse-violet/25 bg-nebula-deep/30 px-4 py-3 text-sm font-medium text-neural-glow lg:hidden"
      aria-expanded="false" aria-controls="catalog-filters-panel">
      <span data-i18n="catalog.filters">Фільтри</span>
      <span id="catalog-filters-chevron" class="text-dim-text transition-transform" aria-hidden="true">▼</span>
    </button>

    <aside id="catalog-filters-panel" class="catalog-filters-panel hidden lg:block lg:w-56 lg:shrink-0">
      <div class="rounded-xl border border-pulse-violet/25 bg-nebula-deep/30 p-4">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-dim-text" data-i18n="catalog.categories">Категорії</h2>
        <div id="filter-categories" class="mt-3 space-y-2 text-sm"></div>

        <h2 class="mt-6 text-xs font-semibold uppercase tracking-wider text-dim-text" data-i18n="catalog.tags">Теги</h2>
        <div id="filter-tags" class="mt-3 flex flex-wrap gap-2"></div>

        <h2 class="mt-6 text-xs font-semibold uppercase tracking-wider text-dim-text" data-i18n="catalog.type">Тип</h2>
        <div id="filter-types" class="mt-3 space-y-2 text-sm">
          <label class="flex items-center gap-2"><input type="checkbox" value="article" class="type-filter rounded"> <span data-i18n="catalog.type.article">Статті</span></label>
          <label class="flex items-center gap-2"><input type="checkbox" value="video" class="type-filter rounded"> <span data-i18n="catalog.type.video">Відео</span></label>
          <label class="flex items-center gap-2"><input type="checkbox" value="pdf" class="type-filter rounded"> <span data-i18n="catalog.type.pdf">PDF</span></label>
          <label class="flex items-center gap-2"><input type="checkbox" value="link" class="type-filter rounded"> <span data-i18n="catalog.type.link">Посилання</span></label>
        </div>
      </div>
    </aside>

    <section class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <p id="catalog-count" class="text-sm text-dim-text" data-i18n="common.loading">Завантаження…</p>
        <label class="flex items-center gap-2 text-sm text-dim-text">
          <span data-i18n="catalog.sort">Сортування</span>
          <select id="catalog-sort" class="rounded-lg border border-pulse-violet/30 bg-space-void px-3 py-1.5 text-starfield-white">
            <option value="newest" data-i18n="catalog.sort.newest">Новіші</option>
            <option value="oldest" data-i18n="catalog.sort.oldest">Старіші</option>
            <option value="title" data-i18n="catalog.sort.title">За назвою A–Z</option>
          </select>
        </label>
      </div>

      <div id="catalog-grid" class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <p class="text-dim-text" data-i18n="common.loading">Завантаження…</p>
      </div>

      <nav id="catalog-pagination" class="mt-8 flex flex-wrap items-center justify-center gap-2"></nav>
    </section>
  </div>
</main>
