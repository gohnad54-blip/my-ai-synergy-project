<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Synergy — Архів клубу</title>
  <meta name="description" content="Архів матеріалів клубу AI Synergy">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'space-void': '#0c0c2a',
            'nebula-deep': '#161438',
            'synapse-blue': '#3b82f6',
            'pulse-violet': '#7c3aed',
            'neural-glow': '#a78bfa',
            'starfield-white': '#b8b4c8',
            'dim-text': '#8c889e',
            'success': '#10b981',
            'danger': '#ef4444',
            'warning': '#f59e0b',
          },
          fontFamily: {
            'display': ['Orbitron', 'sans-serif'],
            'body': ['Inter', 'sans-serif'],
            'mono': ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/particles.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/editor.css">
</head>
<body class="text-starfield-white min-h-screen">
  <div id="particles-bg"></div>
  <div id="app"></div>
  <!-- Netlify build-time form detection (SPA) — must stay in index.html -->
  <form name="account-request" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="account-request">
    <p hidden>
      <label>Don’t fill this out: <input name="bot-field"></label>
    </p>
    <input type="text" name="name">
    <input type="email" name="email">
    <input type="text" name="telegram">
    <textarea name="reason"></textarea>
  </form>
  <script type="module" src="/js/core/router.js"></script>
</body>
</html>
